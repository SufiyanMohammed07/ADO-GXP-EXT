name: GXP Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        cd gxp-demo
        npm install

    - name: Run app (test + tracking)
      run: |
        cd gxp-demo
        npm run test

    - name: Generate report
      run: |
        cd gxp-demo
        npm run report

    - name: Upload Report
      uses: actions/upload-artifact@v4
      with:
        name: execution-report
        path: gxp-demo/report.txt
